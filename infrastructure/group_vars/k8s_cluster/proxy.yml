---
# Tunnel
tunnel_name: tunnel
tunnel_container: cloudflared-tunnel
tunnel_version: latest
tunnel_image: cloudflare/cloudflared:{{ tunnel_version }}
tunnel_replicas: 2
tunnel_config_dir: /etc/cloudflared/config.yml
tunnel_credentials_dir: /etc/cloudflared/credentials.json
tunnel_namespace: cloudflare
tunnel_credentials_secret: tunnel-credentials
tunnel_config: tunnel-config
tunnel_label: cloudflared

# Cloudflare DDNS
ddns_worker_hostname: k8s-worker-1
cloudflare_ddns_version: "latest"
cloudflare_ddns_image: "oznu/cloudflare-ddns:{{ cloudflare_ddns_version }}"
cloudflare_ddns_container: cloudflare-ddns
cloudflare_ddns_zone: "{{ base_domain }}"
cloudflare_ddns_subdomain: "gateway"

# Traefik
traefik_name: traefik
traefik_container: traefik
traefik_version: latest
traefik_image: traefik:{{ traefik_version }}
traefik_replicas: 2
traefik_config_dir: /etc/traefik
traefik_namespace: traefik-system
traefik_dashboard_middleware: dashboard-auth
traefik_dashboard_secret: traefik-dashboard-auth
