---
- name: Deploy MetalLB with Helm
  become: false
  delegate_to: localhost
  tags: k8s-metallb
  block:
    - name: Add MetalLB Helm repository
      kubernetes.core.helm_repository:
        name: metallb
        repo_url: https://metallb.github.io/metallb

    - name: Deploy MetalLB via Helm
      kubernetes.core.helm:
        name: metallb
        chart_ref: metallb/metallb
        release_namespace: metallb-system
        create_namespace: yes
        update_repo_cache: yes
        wait: yes

    - name: Wait MetalLB Webhook startup complete
      ansible.builtin.pause:
        seconds: 5

- name: IP LAN for MetalLB Configuration
  become: false
  delegate_to: localhost
  tags: k8s-metallb
  block:
    - name: Config IP LAN for MetalLB (IP Pool)
      kubernetes.core.k8s:
        state: present
        definition: |
          apiVersion: metallb.io/v1beta1
          kind: IPAddressPool
          metadata:
            name: homelab-pool
            namespace: metallb-system
          spec:
            addresses:
            - 192.168.1.100-192.168.1.200

    - name: Configure L2 Advertisement cho MetalLB
      kubernetes.core.k8s:
        state: present
        definition: |
          apiVersion: metallb.io/v1beta1
          kind: L2Advertisement
          metadata:
            name: homelab-l2
            namespace: metallb-system
          spec:
            ipAddressPools:
            - homelab-pool
