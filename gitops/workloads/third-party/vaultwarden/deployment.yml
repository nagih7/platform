apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      containers:
        - name: vaultwarden
          image: vaultwarden/server:latest-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: DOMAIN
              value: "https://bw.nooblearn2code.com"
            - name: SIGNUPS_ALLOWED
              value: "false" # Lock it down so only you can make an account
          envFrom:
            - secretRef:
                name: vaultwarden-secret
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data-pvc
