apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bot-token-es
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: ms-vault-backend
    kind: SecretStore
  target:
    name: bot-secret
  data:
    - secretKey: BOT_TOKEN
      remoteRef:
        key: discord-bot-1
        property: token
    - secretKey: BOT_NAME
      remoteRef:
        key: discord-bot-1
        property: name
