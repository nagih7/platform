apiVersion: v1
kind: ConfigMap
metadata:
  name: music-bot-config
data:
  VERSION: "2.0.0"
  USE_DATABASE: "true"
  PLAYLIST_DIR: "./playlist"
  STAY_CONNECTED_24_7: "true"
  LOG_LEVEL: "INFO"
  LOG_FILE: ""
  WORKER_COUNT: "3"
  MAX_QUEUE_SIZE: "1000"
  CACHE_SIZE_MB: "200"
  CACHE_DURATION_MINUTES: "360"
  INITIAL_LOAD_SIZE: "3"
