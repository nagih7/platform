apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
data:
  DB_SSLMODE: "disable"
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "5"
  DB_CONN_MAX_LIFETIME: "5m"

  # JWT Configuration
  JWT_ACCESS_TOKEN_DURATION: "15m"
  JWT_REFRESH_TOKEN_DURATION: "720h"

  # Password Configuration
  PASSWORD_MIN_LENGTH: "8"
  PASSWORD_ARGON2_MEMORY: "65536"
  PASSWORD_ARGON2_ITERATIONS: "3"
  PASSWORD_ARGON2_PARALLELISM: "4"
  PASSWORD_ARGON2_SALT_LENGTH: "16"
  PASSWORD_ARGON2_KEY_LENGTH: "32"

  # Rate Limiting
  RATE_LIMIT_LOGIN_WINDOW: "15m"
  RATE_LIMIT_LOGIN_MAX_ATTEMPTS: "5"

  # OAuth Configuration (Optional)
  OAUTH_GOOGLE_CLIENT_ID: ""
  OAUTH_GOOGLE_CLIENT_SECRET: ""
  OAUTH_GOOGLE_REDIRECT_URL: "https://api.nooblearn2code.com/auth/api/v1/auth/oauth/google/callback"

  OAUTH_FACEBOOK_CLIENT_ID: ""
  OAUTH_FACEBOOK_CLIENT_SECRET: ""
  OAUTH_FACEBOOK_REDIRECT_URL: "https://api.nooblearn2code.com/auth/api/v1/auth/oauth/facebook/callback"

  OAUTH_GITHUB_CLIENT_ID: ""
  OAUTH_GITHUB_CLIENT_SECRET: ""
  OAUTH_GITHUB_REDIRECT_URL: "https://api.nooblearn2code.com/auth/api/v1/auth/oauth/github/callback"

  # Email Configuration
  EMAIL_VERIFICATION_URL: "https://api.nooblearn2code.com/auth/api/v1/auth"
  EMAIL_PASSWORD_RESET_URL: "https://api.nooblearn2code.com/auth/api/v1/auth"

  # CORS Configuration
  CORS_ALLOWED_ORIGINS: "*.nooblearn2code.com,https://nooblearn2code.com"
  CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
  CORS_ALLOWED_HEADERS: "Content-Type,Authorization"
  CORS_ALLOW_CREDENTIALS: "true"
  CORS_MAX_AGE: "300"

  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
