apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://traefik.github.io/charts"
    chart: traefik
    targetRevision: 39.0.5
    helm:
      values: |
        deployment:
          kind: DaemonSet

        service:
          type: LoadBalancer

        ports:
          web:
            port: 80
            hostPort: 80
            expose:
              default: true
            exposedPort: 80
            protocol: TCP

          websecure:
            port: 443
            hostPort: 443
            expose:
              default: true
            exposedPort: 443
            protocol: TCP

          postgres:
            port: 5432
            expose:
              default: true
            exposedPort: 5432
            protocol: TCP

          gitlab-ssh:
            port: 2222
            hostPort: 2222
            expose:
              default: true
            exposedPort: 2222
            protocol: TCP

        ingressClass:
          enabled: true
          isDefaultClass: true
          name: traefik
          
        providers:
          kubernetesCRD:
            enabled: true
          kubernetesIngress:
            enabled: true
            
        ingressRoute:
          dashboard:
            enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
