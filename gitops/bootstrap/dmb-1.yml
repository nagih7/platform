apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: discord-bot-1
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/nagih7/platform.git"
    targetRevision: main
    path: gitops/apps/discord-bots/overlays/bot-1
  destination:
    server: "https://kubernetes.default.svc"
    namespace: discord-bots
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
