apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: shared-services
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: "https://github.com/nagih7/platform.git"
        revision: main
        directories:
          - path: gitops/shared_services/*
  template:
    metadata:
      name: "{{path.basename}}"
    spec:
      project: default
      source:
        repoURL: "https://github.com/nagih7/platform.git"
        targetRevision: main
        path: "{{path}}"
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "shared-services"
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
