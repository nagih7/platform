apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workloads
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: "https://github.com/nagih7/platform.git"
        revision: main
        directories:
          - path: gitops/workloads/*
  template:
    metadata:
      name: "{{path.basename}}"
    spec:
      project: workloads
      source:
        repoURL: "https://github.com/nagih7/platform.git"
        targetRevision: main
        path: "{{path}}"
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{path.basename}}" # '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
