apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-bootstrap-platform
  namespace: vault
data:
  platform.sh: |
    #!/bin/sh
    set -e
    echo "==> [04] Configuring Platform Roles..."

    printf 'path "platform/data/databases/*" { capabilities = ["read"] }' \
      | vault policy write platform-databases-policy -
    vault write auth/kubernetes/role/databases-role \
      bound_service_account_names=db-vault-sa \
      bound_service_account_namespaces=databases,postgres,redis \
      policies=platform-databases-policy \
      ttl=1h

    printf 'path "platform/data/tooling/*" { capabilities = ["read"] }' \
      | vault policy write platform-tooling-policy -
    vault write auth/kubernetes/role/tool-role \
      bound_service_account_names=tool-vault-sa \
      bound_service_account_namespaces=tooling,gitlab,runner \
      policies=platform-tooling-policy \
      ttl=1h

    echo "==> [04] ✅ Platform Roles Done"
