apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-bootstrap-auth-methods
  namespace: vault
data:
  auth-methods.sh: |
    #!/bin/sh
    set -e
    echo "==> [01] Configuring Auth Methods..."

    vault auth enable kubernetes || true
    vault write auth/kubernetes/config \
      kubernetes_host="https://kubernetes.default.svc"

    vault auth enable jwt || true
    vault write auth/jwt/config \
      jwks_url="https://gitlab.nooblearn2code.com/-/jwks" \
      bound_issuer="https://gitlab.nooblearn2code.com"

    vault auth enable userpass || true

    echo "==> [01] ✅ Auth Methods Done"
