apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-bootstrap-main
  namespace: vault
data:
  main.sh: |
    #!/bin/sh
    set -e

    export VAULT_ADDR="http://hashicorp-vault.vault.svc.cluster.local:8200"
    export VAULT_TOKEN=$(cat /vault/secrets/root-token)

    echo "================================================"
    echo "==> 🚀 Starting Vault Bootstrap..."
    echo "================================================"

    sh /scripts/auth-methods.sh
    sh /scripts/ci-policy.sh
    sh /scripts/workloads.sh
    sh /scripts/platform.sh
    sh /scripts/infrastructure.sh
    sh /scripts/access.sh

    echo "================================================"
    echo "==> ✅ Vault Bootstrap Complete!"
    echo "================================================"
