apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-bootstrap-ci-policy
  namespace: vault
data:
  ci-policy.sh: |
    #!/bin/sh
    set -e
    echo "==> [02] Configuring GitLab CI Policy..."

    printf 'path "cicd/data/docker" { capabilities = ["read"] }\npath "cicd/data/github" { capabilities = ["read"] }' \
      | vault policy write ci-build-policy -

    printf '{\n  "role_type": "jwt",\n  "bound_audiences": ["https://gitlab.nooblearn2code.com"],\n  "user_claim": "sub",\n  "bound_claims_type": "glob",\n  "bound_claims": {"project_path": ["microservices/*"]},\n  "policies": ["ci-build-policy"],\n  "ttl": "1h"\n}' \
      > /tmp/ci-build-role.json
    vault write auth/jwt/role/ci-build-role @/tmp/ci-build-role.json

    echo "==> [02] ✅ CI Policy Done"
