apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-bootstrap-access
  namespace: vault
data:
  access.sh: |
    #!/bin/sh
    set -e
    echo "==> [06] Configuring Developer Access..."

    # ── Get accessor dynamically ──────────────────────────────
    USERPASS_ACCESSOR=$(vault read -field=accessor sys/auth/userpass)
    echo "Userpass accessor: ${USERPASS_ACCESSOR}"

    if [ -z "${USERPASS_ACCESSOR}" ]; then
      echo "❌ Could not get userpass accessor"
      exit 1
    fi

    # ── Helpers ───────────────────────────────────────────────
    create_entity_if_not_exists() {
      NAME=$1
      if vault read identity/entity/name/${NAME} > /dev/null 2>&1; then
        echo "⏭️  Entity ${NAME} exists — skipping"
      else
        echo "➕ Creating entity ${NAME}"
        vault write identity/entity name="${NAME}"
      fi
    }

    create_alias_if_not_exists() {
      NAME=$1
      ENTITY_ID=$2
      ACCESSOR=$3

      ALIAS_CHECK=$(vault read -field=aliases \
        identity/entity/name/${NAME} 2>/dev/null || echo "")

      if [ "${ALIAS_CHECK}" = "[]" ] || [ -z "${ALIAS_CHECK}" ]; then
        echo "➕ Creating alias ${NAME}"
        vault write identity/entity-alias \
          name="${NAME}" \
          canonical_id="${ENTITY_ID}" \
          mount_accessor="${ACCESSOR}"
      else
        echo "⏭️  Alias ${NAME} exists — skipping"
      fi
    }

    create_group_if_not_exists() {
      GROUP=$1
      POLICY=$2
      ENTITY_IDS=$3
      if vault read identity/group/name/${GROUP} > /dev/null 2>&1; then
        echo "⏭️  Group ${GROUP} exists — skipping"
      else
        echo "➕ Creating group ${GROUP}"
        if [ -z "${ENTITY_IDS}" ]; then
          vault write identity/group \
            name="${GROUP}" \
            type="internal" \
            policies="${POLICY}"
        else
          vault write identity/group \
            name="${GROUP}" \
            type="internal" \
            policies="${POLICY}" \
            member_entity_ids="${ENTITY_IDS}"
        fi
      fi
    }

    # ── Policies ──────────────────────────────────────────────
    printf 'path "*" { capabilities = ["create","read","update","delete","list","sudo"] }' \
      | vault policy write admin-policy -

    printf 'path "workloads/data/microservices/auth-service/*" { capabilities = ["create","read","update","delete","list"] }\npath "workloads/metadata/microservices/auth-service/*" { capabilities = ["list","read","delete"] }' \
      | vault policy write auth-policy -

    printf 'path "workloads/data/microservices/resumind/*" { capabilities = ["create","read","update","delete","list"] }\npath "workloads/metadata/microservices/resumind/*" { capabilities = ["list","read","delete"] }' \
      | vault policy write resumind-policy -

    printf 'path "workloads/data/microservices/uniquizz/*" { capabilities = ["create","read","update","delete","list"] }\npath "workloads/metadata/microservices/uniquizz/*" { capabilities = ["list","read","delete"] }' \
      | vault policy write uniquizz-policy -

    # ── Entities ──────────────────────────────────────────────
    create_entity_if_not_exists "nagih"
    create_entity_if_not_exists "hoanggxyuuki"
    create_entity_if_not_exists "lucastran05"

    # ── Entity IDs ────────────────────────────────────────────
    NAGIH_ID=$(vault read -field=id identity/entity/name/nagih)
    HOANGGXYUUKI_ID=$(vault read -field=id identity/entity/name/hoanggxyuuki)
    LUCASTRAN05_ID=$(vault read -field=id identity/entity/name/lucastran05)

    echo "Entity IDs:"
    echo "  nagih:        ${NAGIH_ID}"
    echo "  hoanggxyuuki: ${HOANGGXYUUKI_ID}"
    echo "  lucastran05:  ${LUCASTRAN05_ID}"

    # ── Aliases ───────────────────────────────────────────────
    create_alias_if_not_exists "nagih"        "${NAGIH_ID}"        "${USERPASS_ACCESSOR}"
    create_alias_if_not_exists "hoanggxyuuki" "${HOANGGXYUUKI_ID}" "${USERPASS_ACCESSOR}"
    create_alias_if_not_exists "lucastran05"  "${LUCASTRAN05_ID}"  "${USERPASS_ACCESSOR}"

    # ── Groups ────────────────────────────────────────────────
    create_group_if_not_exists "admin"          "admin-policy"    "${NAGIH_ID}"
    create_group_if_not_exists "auth-group"     "auth-policy"     ""
    create_group_if_not_exists "resumind-group" "resumind-policy" "${HOANGGXYUUKI_ID}"
    create_group_if_not_exists "uniquizz-group" "uniquizz-policy" "${LUCASTRAN05_ID}"

    echo "==> [06] ✅ Access Done"
    echo ""
    echo "⚠️  Userpass accounts not created — add via UI or CLI:"
    echo "   vault write auth/userpass/users/<name> password=<pass> policies=must-change-password"
