# gitops/infrastructure/security/vault/helm.yml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hashicorp-vault
  namespace: argocd
spec:
  project: default
  source:
    chart: vault
    repoURL: https://helm.releases.hashicorp.com
    targetRevision: 0.27.0
    helm:
      values: |
        injector:
          enabled: false
        server:
          affinity: null
          dev:
            enabled: false
          ui:
            enabled: true
          dataStorage:
            enabled: true
            size: 1Gi

          authDelegator:
            enabled: true

          service:
            active:
              enabled: true
            standby:
              enabled: true

          ha:
            enabled: true
            replicas: 3
            raft:
              enabled: true
              setNodeId: true
              config: |
                ui = true
                api_addr = "https://vault.nooblearn2code.com"
                listener "tcp" {
                  tls_disable = 1
                  address = "[::]:8200"
                  cluster_address = "[::]:8201"
                }
                storage "raft" {
                  path = "/vault/data"
                  retry_join {
                    leader_api_addr = "http://hashicorp-vault-0.hashicorp-vault-internal:8200"
                  }
                  retry_join {
                    leader_api_addr = "http://hashicorp-vault-1.hashicorp-vault-internal:8200"
                  }
                  retry_join {
                    leader_api_addr = "http://hashicorp-vault-2.hashicorp-vault-internal:8200"
                  }
                }
  destination:
    server: "https://kubernetes.default.svc"
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
