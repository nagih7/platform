apiVersion: batch/v1
kind: Job
metadata:
  name: vault-bootstrap
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-options: Replace=true,Force=true
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: vault-admin-sa

      initContainers:
        - name: vault-configurator
          image: hashicorp/vault:1.15
          command:
            - "sh"
            - "/scripts/bootstrap.sh"
          volumeMounts:
            - name: vault-root-token
              mountPath: /vault/secrets
              readOnly: true
            - name: bootstrap-script
              mountPath: /scripts
              readOnly: true

      containers:
        - name: secret-destroyer
          image: bitnami/kubectl:latest
          command:
            - "kubectl"
            - "delete"
            - "secret"
            - "vault-bootstrap-token"
            - "-n"
            - "vault"
            - "--ignore-not-found=true"

      volumes:
        - name: vault-root-token
          secret:
            secretName: vault-bootstrap-token
            items:
              - key: root-token
                path: root-token
        - name: bootstrap-script
          configMap:
            name: vault-bootstrap-script
            defaultMode: 0755

      restartPolicy: Never
