apiVersion: batch/v1
kind: Job
metadata:
  name: vault-bootstrap
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-options: Replace=true,Force=true
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: vault-admin-sa

      initContainers:
        - name: vault-configurator
          image: hashicorp/vault:1.15
          command: ["sh", "/scripts/main.sh"]
          volumeMounts:
            - name: vault-root-token
              mountPath: /vault/secrets
              readOnly: true
            - name: scripts-main
              mountPath: /scripts/main.sh
              subPath: main.sh
            - name: scripts-auth-methods
              mountPath: /scripts/auth-methods.sh
              subPath: auth-methods.sh
            - name: scripts-ci-policy
              mountPath: /scripts/ci-policy.sh
              subPath: ci-policy.sh
            - name: scripts-workloads
              mountPath: /scripts/workloads.sh
              subPath: workloads.sh
            - name: scripts-platform
              mountPath: /scripts/platform.sh
              subPath: platform.sh
            - name: scripts-infrastructure
              mountPath: /scripts/infrastructure.sh
              subPath: infrastructure.sh
            - name: scripts-access
              mountPath: /scripts/access.sh
              subPath: access.sh

      containers:
        - name: secret-destroyer
          image: bitnami/kubectl:latest
          command:
            - "kubectl"
            - "delete"
            - "secret"
            - "vault-bootstrap-token"
            - "-n"
            - "vault"
            - "--ignore-not-found=true"

      volumes:
        - name: vault-root-token
          secret:
            secretName: vault-bootstrap-token
            items:
              - key: root-token
                path: root-token
        - name: scripts-main
          configMap:
            name: vault-bootstrap-main
            defaultMode: 0755
        - name: scripts-auth-methods
          configMap:
            name: vault-bootstrap-auth-methods
            defaultMode: 0755
        - name: scripts-ci-policy
          configMap:
            name: vault-bootstrap-ci-policy
            defaultMode: 0755
        - name: scripts-workloads
          configMap:
            name: vault-bootstrap-workloads
            defaultMode: 0755
        - name: scripts-platform
          configMap:
            name: vault-bootstrap-platform
            defaultMode: 0755
        - name: scripts-infrastructure
          configMap:
            name: vault-bootstrap-infrastructure
            defaultMode: 0755
        - name: scripts-access
          configMap:
            name: vault-bootstrap-access
            defaultMode: 0755

      restartPolicy: Never
