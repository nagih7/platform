apiVersion: batch/v1
kind: Job
metadata:
  name: vault-bootstrap
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: vault-admin-sa

      initContainers:
        - name: vault-configurator
          image: hashicorp/vault:1.15
          command:
            - "sh"
            - "-c"
            - |
              set -e
              export VAULT_ADDR="http://hashicorp-vault.vault.svc.cluster.local:8200"
              export VAULT_TOKEN=$(cat /vault/secrets/root-token)

              echo "==> Configuring Vault..."
              vault auth enable kubernetes || true
              vault write auth/kubernetes/config kubernetes_host="https://kubernetes.default.svc"

              echo "==> Configuring Microservices Role"
              echo 'path "secret/data/*" { capabilities = ["read"] }' | vault policy write shared-microservices-policy -
              vault write auth/kubernetes/role/shared-microservices-role \
                  bound_service_account_names=shared-vault-sa \
                  bound_service_account_namespaces=microservices \
                  policies=shared-microservices-policy \
                  ttl=1h

              echo "==> Configuring Infrastructure Role"
              echo 'path "infrastructure/data/*" { capabilities = ["read"] }' | vault policy write infra-policy -
              vault write auth/kubernetes/role/infra-role \
                  bound_service_account_names=infra-vault-sa \
                  bound_service_account_namespaces=cloudflare,infrastructure,vault \
                  policies=infra-policy \
                  ttl=1h

          volumeMounts:
            - name: vault-root-token
              mountPath: /vault/secrets
              readOnly: true

      containers:
        - name: secret-destroyer
          image: bitnami/kubectl:latest
          command:
            - "kubectl"
            - "delete"
            - "secret"
            - "vault-bootstrap-token"
            - "-n"
            - "vault"
            - "--ignore-not-found=true"

      volumes:
        - name: vault-root-token
          secret:
            secretName: vault-bootstrap-token
            items:
              - key: root-token
                path: root-token
      restartPolicy: Never
