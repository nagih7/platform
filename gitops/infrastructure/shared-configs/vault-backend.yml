apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: infra-vault-backend
spec:
  provider:
    vault:
      server: "http://hashicorp-vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "infra-role"
          serviceAccountRef:
            name: "infra-vault-sa"
