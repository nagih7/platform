apiVersion: apps/v1
kind: Deployment
metadata:
  name: esl-service-api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: esl-service
  template:
    metadata:
      labels:
        app: esl-service
    spec:
      containers:
        - name: app
          image: nooblearn2code/ethnosoul-legacy-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: "production"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
