.debug_vault_template:
  stage: debug
  tags:
    - k8s
  image: docker:26-cli
  variables:
    VAULT_ADDR: "http://hashicorp-vault.vault.svc.cluster.local:8200"
  id_tokens:
    VAULT_ID_TOKEN:
      aud: "https://gitlab.nooblearn2code.com"
  script:
    - apk add --no-cache curl jq

    - echo "=== 1. Check VAULT_ID_TOKEN exists ==="
    - |
      if [ -z "$VAULT_ID_TOKEN" ]; then
        echo "ŌØī VAULT_ID_TOKEN is EMPTY"
      else
        echo "Ō£ģ Token length: $(echo -n $VAULT_ID_TOKEN | wc -c) chars"
        echo "Ō£ģ Token prefix: $(echo $VAULT_ID_TOKEN | cut -c1-20)..."
      fi

    - echo "=== 2. Check Vault reachable ==="
    - |
      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
        "${VAULT_ADDR}/v1/sys/health")
      echo "Vault health HTTP status: ${HTTP_STATUS}"

    - echo "=== 3. Raw Vault JWT login response ==="
    - |
      RAW_RESPONSE=$(curl -s \
        --request POST \
        --data "{\"role\": \"ci-build-role\", \"jwt\": \"${VAULT_ID_TOKEN}\"}" \
        "${VAULT_ADDR}/v1/auth/jwt/login")
      echo "Raw response: ${RAW_RESPONSE}"

    - echo "=== 4. Decoded JWT claims (what Vault actually sees) ==="
    - |
      # Decode the JWT payload without verifying signature
      PAYLOAD=$(echo "$VAULT_ID_TOKEN" | cut -d'.' -f2)
      # Add padding if needed
      PADDED=$(echo "$PAYLOAD$(printf '%0.s=' $(seq 1 $((4 - ${#PAYLOAD} % 4))))")
      echo "$PADDED" | base64 -d 2>/dev/null | jq . || echo "Could not decode payload"

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: manual

.build_template:
  stage: build
  tags:
    - k8s
  image:
    name: gcr.io/kaniko-project/executor:v1.23.0-debug
    entrypoint: [""]
  id_tokens:
    VAULT_ID_TOKEN:
      aud: "https://gitlab.nooblearn2code.com"
  before_script:
    - |
      echo "­¤öÉ Authenticating to Vault..."

      if [ -z "${VAULT_ADDR}" ]; then
        echo "ŌØī VAULT_ADDR is not set"
        exit 1
      fi

      if [ -z "${IMAGE_NAME}" ]; then
        echo "ŌØī IMAGE_NAME is not set"
        exit 1
      fi

      VAULT_RESPONSE=$(wget -qO- \
        --header "Content-Type: application/json" \
        --post-data "{\"role\":\"ci-build-role\",\"jwt\":\"${VAULT_ID_TOKEN}\"}" \
        "${VAULT_ADDR}/v1/auth/jwt/login")

      VAULT_TOKEN=$(echo "${VAULT_RESPONSE}" | grep -o '"client_token":"[^"]*"' | cut -d'"' -f4)

      if [ -z "$VAULT_TOKEN" ] || [ "$VAULT_TOKEN" = "null" ]; then
        echo "ŌØī Vault auth failed! Response: ${VAULT_RESPONSE}"
        exit 1
      fi

      echo "Ō£ģ Vault token acquired"

      DOCKER_RESPONSE=$(wget -qO- \
        --header "X-Vault-Token: ${VAULT_TOKEN}" \
        "${VAULT_ADDR}/v1/cicd/data/docker")

      DOCKER_USERNAME=$(echo "${DOCKER_RESPONSE}" | grep -o '"username":"[^"]*"' | cut -d'"' -f4)
      DOCKER_PASSWORD=$(echo "${DOCKER_RESPONSE}" | grep -o '"password":"[^"]*"' | cut -d'"' -f4)

      GITHUB_RESPONSE=$(wget -qO- \
        --header "X-Vault-Token: ${VAULT_TOKEN}" \
        "${VAULT_ADDR}/v1/cicd/data/github")

      export GITHUB_USERNAME=$(echo "${GITHUB_RESPONSE}" | grep -o '"username":"[^"]*"' | cut -d'"' -f4)
      export GITHUB_PAT=$(echo "${GITHUB_RESPONSE}" | grep -o '"pat":"[^"]*"' | cut -d'"' -f4)

      mkdir -p /kaniko/.docker
      echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(echo -n "${DOCKER_USERNAME}:${DOCKER_PASSWORD}" | base64 | tr -d '\n')\"}}}" \
        > /kaniko/.docker/config.json

      echo "Ō£ģ All credentials ready"

  script:
    - |
      IMAGE_SHA="${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
      IMAGE_LATEST="${IMAGE_NAME}:latest"

      echo "­¤ö© Building ${IMAGE_SHA} with Kaniko..."

      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile" \
        --destination "${IMAGE_SHA}" \
        --destination "${IMAGE_LATEST}" \
        --cache=true \
        --cache-repo "${IMAGE_NAME}/cache" \
        --no-push-cache \
        --label "git.commit=${CI_COMMIT_SHA}" \
        --label "git.branch=${CI_COMMIT_REF_NAME}" \
        --label "build.date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      echo "Ō£ģ Build complete ŌåÆ ${IMAGE_SHA}"

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

.update_gitops_template:
  stage: deploy
  tags:
    - k8s
  image: alpine/git:latest
  id_tokens:
    VAULT_ID_TOKEN:
      aud: "https://gitlab.nooblearn2code.com"
  before_script:
    - |
      apk add --no-cache curl jq 2>/dev/null || true

      VAULT_TOKEN=$(curl -s \
        --request POST \
        --header "Content-Type: application/json" \
        --data "{\"role\":\"ci-build-role\",\"jwt\":\"${VAULT_ID_TOKEN}\"}" \
        "${VAULT_ADDR}/v1/auth/jwt/login" | jq -r '.auth.client_token')

      if [ -z "$VAULT_TOKEN" ] || [ "$VAULT_TOKEN" = "null" ]; then
        echo "ŌØī Vault auth failed!"
        exit 1
      fi

      GITHUB_CREDS=$(curl -s \
        --header "X-Vault-Token: ${VAULT_TOKEN}" \
        "${VAULT_ADDR}/v1/cicd/data/github" | jq -r '.data.data')

      export GITHUB_USERNAME=$(echo "$GITHUB_CREDS" | jq -r '.username')
      export GITHUB_PAT=$(echo "$GITHUB_CREDS" | jq -r '.pat')
      echo "Ō£ģ GitHub credentials fetched"

  script:
    - |
      wget -qO- https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.3.0/kustomize_v5.3.0_linux_amd64.tar.gz \
        | tar xz -C /usr/local/bin/

      git config --global user.email "ci@nooblearn2code.com"
      git config --global user.name "GitLab CI"

      git clone "https://${GITHUB_USERNAME}:${GITHUB_PAT}@github.com/nagih7/platform.git" gitops-repo
      cd gitops-repo/${GITOPS_PATH}/${KUSTOMIZE_SERVICE}

      kustomize edit set image \
        "${IMAGE_NAME}=${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"

      git add kustomization.yml
      git diff --staged --quiet && echo "ŌÅŁ’ĖÅ No changes" && exit 0

      git commit -m "ci: update ${KUSTOMIZE_SERVICE} to ${CI_COMMIT_SHORT_SHA} [skip ci]"
      git push "https://${GITHUB_USERNAME}:${GITHUB_PAT}@github.com/nagih7/platform.git" main
      echo "Ō£ģ GitOps updated"

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

.debug_vault_template:
  stage: debug
  tags:
    - k8s
  image: docker:26-cli
  id_tokens:
    VAULT_ID_TOKEN:
      aud: "https://gitlab.nooblearn2code.com"
  script:
    - apk add --no-cache curl jq
    - |
      echo "VAULT_ADDR=${VAULT_ADDR}"
      echo "IMAGE_NAME=${IMAGE_NAME}"
      RESP=$(curl -s --request POST \
        --data "{\"role\":\"ci-build-role\",\"jwt\":\"${VAULT_ID_TOKEN}\"}" \
        "${VAULT_ADDR}/v1/auth/jwt/login")
      echo "Vault response: ${RESP}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: manual
