---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-es
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: db-vault-backend
    kind: SecretStore
  target:
    name: postgres-secret
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: databases/postgres
        property: user
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: databases/postgres
        property: password
