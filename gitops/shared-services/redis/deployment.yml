apiVersion: apps/v1
kind: Deployment
metadata:
  name: shared-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shared-redis
  template:
    metadata:
      labels:
        app: shared-redis
    spec:
      containers:
        - name: redis
          image: redis:8-alpine
          command:
            [
              "redis-server",
              "--requirepass",
              "$(REDIS_PASSWORD)",
              "--appendonly",
              "yes",
            ]
          envFrom:
            - secretRef:
                name: shared-redis-secret
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: shared-redis-pvc
