---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-config-pvc
spec:
  storageClassName: local-path-retain
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 500Mi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-data-pvc
spec:
  storageClassName: local-path-retain
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
