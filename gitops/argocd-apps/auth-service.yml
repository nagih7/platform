apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/nagih7/homelab-gitops.git"
    targetRevision: main
    path: microservices/auth-service
  destination:
    server: "https://kubernetes.default.svc"
    namespace: microservices
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
