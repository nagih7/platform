---
- hosts: all
  become: true
  roles:
    - role: bootstrap
      tags: bootstrap

- hosts: reverse-proxy
  become: true

  roles:
    - role: docker
      tags: docker

    - role: proxy
      tags: proxy

- hosts: minecraft-server
  become: true

  roles:
    - role: docker
      tags: docker

    - role: backup
      tags: backup

    - role: minecraft
      tags: minecraft

- name: Setup K8s Cluster (K3s)
  hosts: k8s_cluster
  become: true
  tags: k8s-cluster
  roles:
    - role: tailscale
      tags: tailscale

- name: Setup K3s Control Plane
  hosts: k8s_master
  tags: k8s-cluster
  roles:
    - role: k8s_master
      tags: k8s-master
      become: true

    - role: k8s-addons
      tags: k8s-addons

- name: Setup K3s Workers
  hosts: k8s_worker
  tags: k8s-cluster
  roles:
    - role: k8s_worker
      tags: k8s-worker
