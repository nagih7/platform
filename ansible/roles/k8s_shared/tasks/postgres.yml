---
- name: Deploy Shared Data Services (Postgres & Redis)
  delegate_to: localhost
  become: false
  tags: k8s-postgres

  block:
    - name: Ensure Local StorageClass exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: local-storage
          provisioner: kubernetes.io/no-provisioner
          volumeBindingMode: WaitForFirstConsumer

    - name: Deploy Postgres Infrastructure (PV, PVC, STS, SVC)
      kubernetes.core.k8s:
        state: present
        definition: |
          ---
          apiVersion: v1
          kind: PersistentVolume
          metadata:
            name: "{{ postgres_pv }}"
          spec:
            capacity:
              storage: "{{ postgres_storage }}"
            volumeMode: Filesystem
            accessModes: [ReadWriteOnce]
            persistentVolumeReclaimPolicy: Retain
            storageClassName: local-storage
            local:
              path: "{{ postgres_mount_path }}"
            nodeAffinity:
              required:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                    - "{{ postgres_node }}"
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: postgres-data-pvc
            namespace: "{{ shared_services_namespace }}"
          spec:
            accessModes: [ReadWriteOnce]
            storageClassName: local-storage
            resources:
              requests:
                storage: "{{ postgres_storage }}"
            volumeName: "{{ postgres_pv }}"
          ---
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: shared-postgres
            namespace: "{{ shared_services_namespace }}"
          spec:
            serviceName: shared-postgres-service
            replicas: 1
            selector:
              matchLabels:
                app: shared-postgres
            template:
              metadata:
                labels:
                  app: shared-postgres
              spec:
                containers:
                - name: postgres
                  image: postgres:18-alpine
                  env:
                  - name: POSTGRES_USER
                    value: "{{ postgres_root_user }}"
                  - name: POSTGRES_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: shared-db-secrets
                        key: postgres-password
                  - name: PGDATA
                    value: /var/lib/postgresql/data/pgdata
                  ports:
                  - containerPort: 5432
                  volumeMounts:
                  - name: postgres-data
                    mountPath: /var/lib/postgresql/data
                volumes:
                - name: postgres-data
                  persistentVolumeClaim:
                    claimName: postgres-data-pvc
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: shared-postgres-service
            namespace: "{{ shared_services_namespace }}"
          spec:
            type: NodePort
            selector:
              app: shared-postgres
            ports:
              - port: 5432
                targetPort: 5432
                nodePort: 32543

    - name: Wait for PostgreSQL Pod to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ shared_services_namespace }}"
        label_selectors:
          - app=shared-postgres
      register: pg_pod
      until: "pg_pod.resources | length > 0 and pg_pod.resources[0].status.phase == 'Running'"
      retries: 30
      delay: 5

    - name: Create Application Users and Databases
      community.postgresql.postgresql_user:
        name: "{{ item.user }}"
        password: "{{ item.password }}"
        login_host: "{{ hostvars[postgres_node]['ansible_host'] }}"
        login_port: "32543"
        login_user: "{{ postgres_root_user }}"
        login_password: "{{ postgres_root_password }}"
        state: present
      loop: "{{ databases }}"

    - name: Create PostgreSQL Databases
      community.postgresql.postgresql_db:
        name: "{{ item.name }}"
        owner: "{{ item.user }}"
        login_host: "{{ hostvars[postgres_node]['ansible_host'] }}"
        login_port: "32543"
        login_user: "{{ postgres_root_user }}"
        login_password: "{{ postgres_root_password }}"
        state: present
      loop: "{{ databases }}"
