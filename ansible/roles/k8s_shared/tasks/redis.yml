---
- name: Redis Configuration
  become: false
  delegate_to: localhost
  tags: k8s-redis
  block:
    - name: Deploy Redis (Stateless-like with Auto Storage)
      kubernetes.core.k8s:
        state: present
        definition: |
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: redis-data-pvc
            namespace: shared-services
          spec:
            accessModes: [ReadWriteOnce]
            storageClassName: local-path
            resources:
              requests:
                storage: 2Gi
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: shared-redis
            namespace: "{{ shared_services_namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: shared-redis
            template:
              metadata:
                labels:
                  app: shared-redis
              spec:
                containers:
                - name: redis
                  image: redis:8-alpine
                  command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)", "--appendonly", "yes"]
                  env:
                  - name: REDIS_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: shared-db-secrets
                        key: redis-password
                  ports:
                  - containerPort: 6379
                  volumeMounts:
                  - name: redis-data
                    mountPath: /data
                volumes:
                - name: redis-data
                  persistentVolumeClaim:
                    claimName: redis-data-pvc
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: shared-redis-service
            namespace: shared-services
          spec:
            selector:
              app: shared-redis
            ports:
              - port: 6379
                targetPort: 6379
