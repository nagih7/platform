---
- name: Deploy Namespaces
  delegate_to: localhost
  become: false
  tags: k8s-ns
  block:
    - name: Create namespaces
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ item }}"
      loop: "{{ namespaces }}"
