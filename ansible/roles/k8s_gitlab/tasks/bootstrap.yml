---
- name: Gitlab Bootstrap Configuration
  become: false
  delegate_to: localhost
  block:
    - name: Create GitLab namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ gitlab_namespace }}"

    - name: Deploy Persistent Volume Claims
      kubernetes.core.k8s:
        state: present
        definition: |
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: gitlab-data-pvc
            namespace: {{ gitlab_namespace }}
          spec:
            storageClassName: local-path
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: "{{ gitlab_data_storage }}"
            volumeName: "{{ gitlab_data_pv }}"

          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: gitlab-config-pvc
            namespace: "{{ gitlab_namespace }}"
          spec:
            storageClassName: local-path
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: "{{ gitlab_config_storage }}"
            volumeName: "{{ gitlab_config_pv }}"
